name: Build Serial

on:
  push:
    tags:
      - 'serial-v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore SmartPower.Serial/SmartPower.Serial.csproj

      - run: |
          dotnet publish SmartPower.Serial/SmartPower.Serial.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained true

      - uses: actions/upload-artifact@v4
        with:
          name: SmartPower.Serial-${{ github.ref_name }}
          path: SmartPower.Serial/bin/Release/net10.0/linux-arm64/publish/**

      - uses: softprops/action-gh-release@v2
        with:
          name: SmartPower.Serial ${{ github.ref_name }}
          files: SmartPower.Serial/bin/Release/net10.0/linux-arm64/publish/**