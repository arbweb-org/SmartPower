name: Build RC
on:
  push:
    tags:
      - 'rc-v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore SmartPower.RC/SmartPower.RC.csproj
      - run: |
          dotnet publish SmartPower.RC/SmartPower.RC.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -o publish/
      - uses: actions/upload-artifact@v4
        with:
          name: SmartPower.RC-${{ github.ref_name }}
          path: publish/
      - uses: softprops/action-gh-release@v2
        with:
          name: SmartPower.RC ${{ github.ref_name }}
          files: publish/SmartPower.RC